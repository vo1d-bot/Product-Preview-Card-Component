<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- displays site properly based on user's device -->

  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">

  <title>Frontend Mentor | Product preview card component</title>

  <link rel="stylesheet" href="styles.css">
</head>

<body>
  <main>
    <article class="product-card">
      <picture class="product__photo">
        <source srcset="./images/image-product-desktop.jpg" media="(min-width: 768px)">
        <img src="./images/image-product-mobile.jpg" alt="Gabrielle Essence Eau De Parfum bottle by Chanel">
      </picture>

      <div class="product__details">
        <p class="product__tag">PERFUME</p>

        <h1 class="product__name">
          Gabrielle Essence Eau De Parfum
        </h1>

        <p class="product__info">
          A floral, solar and voluptuous interpretation composed by Olivier Polge,
          Perfumer-Creator for the House of CHANEL.
        </p>

        <div class="product__pricing">
          <p class="offer__price">
            <ins>$149.99</ins>
          </p>
          <p class="original__price">
            <del>$169.99</del>
          </p>
        </div>

        <button class="cart__btn" type="button">
          <img src="./images/icon-cart.svg" alt="" aria-hidden="true">
          <span>Add to Cart</span>
        </button>
      </div>
    </article>
  </main>
</body>

</html>
